<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Košík | FootyShop</title>

  <!-- základní styl (už máš) -->
  <link rel="stylesheet" href="katalog.css">
  <!-- nový styl jen pro košík -->
  <link rel="stylesheet" href="kosik.css">
</head>

<body class="dark">

<header class="site-header">
  <a href="maturitni_projekt_eshop_uvodni_stranka.html" class="brand" aria-label="Domů">
    <img src="obrazky/logo_eshop.png" class="brand-logo" alt="FootyShop logo">
  </a>

  <div class="nav-wrapper">
    <nav class="top-nav" aria-label="Hlavní menu">
      <a class="nav-link" href="katalog.html">Katalog</a>
      <a class="nav-link" href="novinky.html">Novinky</a>
      <a class="nav-link" href="kontakt.html">Kontakt</a>
    </nav>
  </div>
</header>

<main class="cart-page">
  <div class="cart-head">
    <h1>Můj košík</h1>
    <a class="cart-back" href="katalog.html">← Pokračovat v nákupu</a>
  </div>

  <div class="cart-layout">
    <!-- seznam položek -->
    <section class="cart-list">
      <div id="cartItems"></div>
    </section>

    <!-- souhrn -->
    <aside class="cart-summary">
      <h2>Souhrn objednávky</h2>

      <div class="summary-row">
        <span>Celkem</span>
        <strong id="cartTotal"></strong>
      </div>

      <button id="clearCart" type="button" class="btn-danger">Vymazat košík</button>

      <button type="button" class="btn-primary" onclick="alert('Platební brána je demo :)')">
        Pokračovat k pokladně
      </button>

      <p class="summary-note">
        * Toto je školní projekt – pokladna je ukázková.
      </p>
    </aside>
  </div>
</main>

<script src="products.js"></script>
<script src="cart.js"></script>

</body>
</html>
